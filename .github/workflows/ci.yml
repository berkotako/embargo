name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  engine:
    name: Engine (Rust)
    runs-on: ubuntu-latest
    # Build/clippy/test against the committed sqlx offline cache (engine/.sqlx),
    # so CI needs no database. Regenerate with `cargo sqlx prepare` when queries change.
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - name: fmt
        working-directory: engine
        run: cargo fmt --all -- --check
      - name: clippy
        working-directory: engine
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        working-directory: engine
        run: cargo test --all

  gateway:
    name: Gateway (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gateway/package-lock.json
      - working-directory: gateway
        run: npm ci
      - working-directory: gateway
        run: npm run typecheck
      - working-directory: gateway
        run: npm run lint
      - working-directory: gateway
        run: npm test

  console:
    name: Console (React/TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: console/package-lock.json
      - working-directory: console
        run: npm ci
      - working-directory: console
        run: npm run typecheck
      - working-directory: console
        run: npm run lint
      - working-directory: console
        run: npm run build

  policy-schema:
    name: Policy schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate example policies against schema
        run: |
          npm install -g ajv-cli
          ajv validate -s policy/policy.schema.json -d "policy/examples/*.yaml" --spec=draft2020
