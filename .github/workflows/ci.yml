name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  engine:
    name: Engine (Rust)
    runs-on: ubuntu-latest
    # Build/clippy/test against the committed sqlx offline cache (engine/.sqlx),
    # so CI needs no database. Regenerate with `cargo sqlx prepare` when queries change.
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - name: fmt
        working-directory: engine
        run: cargo fmt --all -- --check
      - name: clippy
        working-directory: engine
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        working-directory: engine
        run: cargo test --all

  engine-integration:
    name: Engine integration (Postgres + Redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: embargo
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/embargo
      EMBARGO_REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres,rustls --version ^0.8
      - name: Run migrations
        working-directory: engine
        run: sqlx migrate run --source migrations
      - name: Integration tests
        working-directory: engine
        # Single-threaded: these DB-backed tests share one Postgres + Redis and a
        # single active-policy row, so running them in parallel makes them stomp
        # each other (flaky). Serialize for deterministic results.
        run: cargo test -p embargo-engine -- --include-ignored --test-threads=1

  gateway:
    name: Gateway (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gateway/package-lock.json
      - working-directory: gateway
        run: npm ci
      - working-directory: gateway
        run: npm run typecheck
      - working-directory: gateway
        run: npm run lint
      - working-directory: gateway
        run: npm test

  admission:
    name: Admission (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admission/package-lock.json
      - working-directory: admission
        run: npm ci
      - working-directory: admission
        run: npm run typecheck
      - working-directory: admission
        run: npm run lint
      - working-directory: admission
        run: npm test
      - working-directory: admission
        run: npm run build

  console:
    name: Console (React/TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: console/package-lock.json
      - working-directory: console
        run: npm ci
      - working-directory: console
        run: npm run typecheck
      - working-directory: console
        run: npm run lint
      - working-directory: console
        run: npm run build

  sandbox:
    name: Sandbox (Rust, L3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sandbox
      - name: fmt
        working-directory: sandbox
        run: cargo fmt --all -- --check
      - name: clippy
        working-directory: sandbox
        run: cargo clippy --all-targets -- -D warnings
      - name: Ensure unprivileged userns is enabled
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - name: test (incl. real containment)
        working-directory: sandbox
        run: cargo test -- --include-ignored

  policy-schema:
    name: Policy schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate example policies against schema
        run: |
          npm install -g ajv-cli
          ajv validate -s policy/policy.schema.json -d "policy/examples/*.yaml" --spec=draft2020
