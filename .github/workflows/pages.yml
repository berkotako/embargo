# Build and deploy the Embargo landing page (site/) to GitHub Pages.
# One-time setup: repo Settings → Pages → Build and deployment → Source:
# "GitHub Actions". Then this runs on every push to main that touches the site.
name: pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "assets/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site (page + shared illustrations)
        run: |
          mkdir -p _site/assets
          cp -r site/. _site/
          cp assets/*.png _site/assets/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
