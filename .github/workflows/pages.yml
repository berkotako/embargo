# Build and deploy the Embargo landing page (site/) to GitHub Pages.
# One-time setup: repo Settings → Pages → Build and deployment → Source:
# "GitHub Actions". Then this runs on every push to main that touches the site.
name: pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "assets/**"
      - "docs/design/console-prototype/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Assemble site (page + shared illustrations + console demo)
        run: |
          mkdir -p _site/assets
          cp -r site/. _site/
          cp assets/*.png _site/assets/
          # Interactive console demo (self-contained React prototype, mock data).
          mkdir -p _site/demo
          cp -r "docs/design/console-prototype/." _site/demo/
          cp "_site/demo/Embargo Console.html" _site/demo/index.html

      - uses: actions/configure-pages@v6
        with:
          # Enable Pages (Source = GitHub Actions) automatically on first run,
          # so no manual Settings → Pages toggle is needed.
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v5
