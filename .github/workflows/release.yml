# Release: on a `vX.Y.Z` tag, build and push the engine/gateway/console images
# to GHCR and publish a GitHub Release. Image tags follow the git tag
# (e.g. 0.1.0, 0.1, latest). compose.prod.yml pulls these.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push images to GHCR

jobs:
  images:
    name: build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: embargo-engine
            context: ./engine
            file: ./engine/Dockerfile
            build_args: ""
          - image: embargo-gateway
            context: .
            file: ./gateway/Dockerfile
            build_args: ""
          - image: embargo-console
            context: ./console
            file: ./console/Dockerfile
            # Vite inlines auth mode at build time. The published image ships
            # `dev` (role picker) so the released stack runs out of the box;
            # OIDC deployments rebuild the console with their VITE_OIDC_* args.
            build_args: |
              VITE_AUTH_MODE=dev
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github_release:
    name: publish GitHub Release
    needs: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
