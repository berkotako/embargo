<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="420" viewBox="0 0 1600 420" font-family="IBM Plex Sans, system-ui, sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#11161f"/>
      <stop offset="100%" stop-color="#0b0e14"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="420" fill="url(#bg)"/>
  <g stroke="#1b2230" stroke-width="1" opacity=".5">
    <path d="M0 140H1600M0 280H1600"/>
  </g>

  <!-- question mark built from connected nodes, centered ~ (800,180) -->
  <g transform="translate(800,200)">
    <!-- connecting path (faint) -->
    <path d="M-78 -40 C -96 -86 -64 -126 -16 -132 C 36 -138 70 -104 60 -58
             C 54 -28 28 -10 8 8 C -8 24 -14 44 -14 70"
          fill="none" stroke="#2b3548" stroke-width="3" opacity=".85"/>
    <line x1="-14" y1="104" x2="-14" y2="118" stroke="#2b3548" stroke-width="3" opacity=".85"/>

    <!-- nodes along the curve -->
    <g filter="url(#glow)">
      <!-- bottom-left start (amber accent) -->
      <circle cx="-78" cy="-40" r="13" fill="#332a12" stroke="#f59e0b" stroke-width="2.5"/>
      <circle cx="-94" cy="-92" r="11" fill="#11301f" stroke="#34d399" stroke-width="2.5"/>
      <circle cx="-52" cy="-126" r="12" fill="#11301f" stroke="#34d399" stroke-width="2.5"/>
      <!-- top (focal, larger) -->
      <circle cx="2" cy="-134" r="15" fill="#11301f" stroke="#34d399" stroke-width="3"/>
      <circle cx="52" cy="-104" r="12" fill="#11301f" stroke="#34d399" stroke-width="2.5"/>
      <!-- curving in (red accent) -->
      <circle cx="40" cy="-50" r="11" fill="#321717" stroke="#ef4444" stroke-width="2.5"/>
      <circle cx="6" cy="-16" r="12" fill="#11301f" stroke="#34d399" stroke-width="2.5"/>
      <!-- stem -->
      <circle cx="-14" cy="36" r="12" fill="#11301f" stroke="#34d399" stroke-width="2.5"/>
      <!-- the dot -->
      <circle cx="-14" cy="118" r="14" fill="#0f7a52" stroke="#34d399" stroke-width="3"/>
    </g>

    <!-- tiny package cubes orbiting -->
    <g opacity=".9">
      <rect x="-150" y="-150" width="18" height="18" rx="4" fill="#11161f" stroke="#2b3548"/>
      <rect x="92" y="-150" width="18" height="18" rx="4" fill="#11161f" stroke="#2b3548"/>
      <rect x="96" y="60" width="18" height="18" rx="4" fill="#11161f" stroke="#2b3548"/>
      <rect x="-150" y="86" width="18" height="18" rx="4" fill="#11161f" stroke="#2b3548"/>
    </g>
  </g>
</svg>
