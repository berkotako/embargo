server {
    listen 4000;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — serve index.html for all non-asset paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://engine:8080/;
        proxy_set_header Host $host;
    }
}
