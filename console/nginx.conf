server {
    listen 4000;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — serve index.html for all non-asset paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy the admin API to the engine, preserving the /api prefix.
    location /api/ {
        proxy_pass http://engine:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Embargo-Role $http_x_embargo_role;
        proxy_set_header X-Embargo-Email $http_x_embargo_email;
        proxy_set_header Authorization $http_authorization;
    }
}
