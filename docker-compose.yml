services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: embargo
      POSTGRES_USER: embargo
      POSTGRES_PASSWORD: embargo_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U embargo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    environment:
      EMBARGO__DATABASE__URL: postgresql://embargo:embargo_dev@postgres:5432/embargo
      EMBARGO__DATABASE__MAX_CONNECTIONS: "5"
      EMBARGO__REDIS__URL: redis://redis:6379
      EMBARGO__REDIS__VERDICT_TTL_SECS: "300"
      EMBARGO__GRPC__ADDR: "[::]:50051"
      EMBARGO__METRICS_ADDR: "[::]:9090"
      EMBARGO__TLS__CERT_PEM: /certs/engine.crt
      EMBARGO__TLS__KEY_PEM: /certs/engine.key
      EMBARGO__TLS__CA_PEM: /certs/ca.crt
      EMBARGO__OBSERVABILITY__LOG_FORMAT: pretty
      EMBARGO__OBSERVABILITY__LOG_LEVEL: debug
    ports:
      - "50051:50051"
      - "9090:9090"
    volumes:
      - ./certs:/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    environment:
      ENGINE_ADDR: engine:50051
      CONSOLE_BASE_URL: http://localhost:4000
      TLS_CA_PEM: /certs/ca.crt
      TLS_CERT_PEM: /certs/gateway.crt
      TLS_KEY_PEM: /certs/gateway.key
    ports:
      - "4873:4873"
    volumes:
      - ./certs:/certs:ro
    depends_on:
      - engine

  console:
    build:
      context: ./console
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    depends_on:
      - engine

volumes:
  pg_data:
